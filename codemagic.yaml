# =====================================================================
# Codemagic CI — сборка приложения ЗАКАЗЧИКА «Диспетчер №1» под iOS.
#
# Секреты В ЭТОМ ФАЙЛЕ НЕ ХРАНЯТСЯ. Перед первым запуском настрой в
# интерфейсе Codemagic (один раз):
#
#  1) Группа переменных окружения с именем  dispatcher_customer
#     (Codemagic → твоё приложение → Environment variables), все «Secure»:
#       SUPABASE_URL              = https://jokaynapesbem.beget.app
#       SUPABASE_ANON_KEY         = <полный anon-ключ из run_prod.bat>
#       DADATA_API_KEY            = 4ea784d86f4db111966e8938977bf0892ebd53ca
#       GOOGLE_SERVICE_INFO_PLIST = <GoogleService-Info.plist в base64>  (как сделать — ниже)
#
#  2) Интеграция App Store Connect (Codemagic → Teams → Integrations →
#     App Store Connect): загрузи .p8 API-ключ, Key ID, Issuer ID.
#     Назови интеграцию ровно  dispatcher_appstore  (имя ниже ссылается на неё).
#     Подпись iOS делается автоматически по этому ключу — сертификаты
#     вручную заводить НЕ нужно.
#
#  Как получить base64 для GOOGLE_SERVICE_INFO_PLIST на Windows (PowerShell):
#    [Convert]::ToBase64String([IO.File]::ReadAllBytes("C:\путь\GoogleService-Info.plist"))
#  Скопируй вывод одной строкой в переменную.
# =====================================================================

workflows:
  ios-customer:
    name: Диспетчер — заказчик (iOS)
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: dispatcher_appstore   # имя интеграции из Codemagic UI

    environment:
      groups:
        - dispatcher_customer                   # переменные окружения (см. шапку)
      flutter: 3.41.7                           # как в локальной сборке
      xcode: latest
      cocoapods: default

    scripts:
      - name: GoogleService-Info.plist из переменной
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
          test -s ios/Runner/GoogleService-Info.plist || { echo "GoogleService-Info.plist пуст — проверь переменную"; exit 1; }
      - name: Зависимости Flutter
        script: flutter pub get
      - name: CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Подпись iOS — сертификат и профиль (создаём, если их ещё нет)
        # Явная подпись вместо автоматического ios_signing (тот не создаёт
        # профиль/сертификат для нового приложения, падал «No matching profiles»
        # / «No valid code signing certificates»). Дистрибуционный сертификат
        # переиспользуется тот же, что у исполнителя (один CERTIFICATE_PRIVATE_KEY
        # на весь Apple-аккаунт) — создаётся лишь новый профиль под этот bundle id.
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.dispatcher1.dispatcher1" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Сборка IPA
        script: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=DADATA_API_KEY="$DADATA_API_KEY" \
            --export-options-plist=$HOME/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true        # автозаливка в TestFlight после сборки
        # submit_to_app_store: false      # включишь, когда захочешь сразу на ревью в App Store
