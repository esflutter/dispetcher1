name: dispatcher_1
description: "Диспетчер №1 — Биржа услуг спецтехники"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  go_router: ^17.2.2
  mask_text_input_formatter: ^2.9.0
  smooth_page_indicator: ^2.0.1
  pinput: ^6.0.2
  connectivity_plus: ^7.1.1
  geolocator: ^14.0.2
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  supabase_flutter: ^2.8.0
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0
  # HTTP-клиент для DaData Suggest API (подсказки адресов с координатами).
  # Привязан к версии, которую и так тянет supabase_flutter транзитивно,
  # но указываем явно — это direct dep наших файлов в `lib/core/dadata/`.
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true

# Нативный splash до загрузки Flutter — намеренно ПЛЕЙН-БЕЛЫЙ, без
# логотипа. Дальше Flutter рисует `splash_screen.dart` с лого + текстом
# «Диспетчер №1» + жёлтым спиннером — единственный «правильный»
# splash, который видит пользователь. Если показать иконку и здесь —
# будет визуальный jumpcut: «голая иконка → иконка с текстом и
# спиннером», что выглядит сломанно.
# (На Android 12+ система всё равно покажет системный лаунчер-иконку
# в первый кадр — это поведение OS, отключить нельзя.)
flutter_native_splash:
  color: "#FFFFFF"
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/categories/
    - assets/images/catalog/
    - assets/images/orders/
    - assets/icons/
    - assets/icons/nav/
    - assets/icons/ui/
    - assets/icons/support/
    - assets/icons/profile/
    - assets/images/profile/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
